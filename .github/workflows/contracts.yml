name: Contract Checks

on:
  push:
    branches: [main, "*-contract-*"]
  pull_request:
    branches: [main]

jobs:
  non-rest-contracts:
    name: Non-REST Contracts (P0a)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Install backend deps
        run: uv sync --extra dev
      - name: Validate contracts
        run: make validate-contracts
      - name: Check generated freshness
        run: make check-generated
      - name: P0 mypy
        run: make mypy-p0

  vscode-contracts:
    name: VS Code Generated Contracts
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode-extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: vscode-extension/package-lock.json
      - name: Install VS Code deps
        run: npm ci
      - name: Typecheck generated contracts
        run: npx tsc --noEmit
      - name: Run VS Code contract tests
        run: npm run test:contracts

  runtime-api:
    name: Runtime API Conformance (P0b)
    runs-on: ubuntu-latest
    needs: [non-rest-contracts]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Install backend deps
        run: uv sync --extra dev
      - name: Runtime API conformance
        run: make api-runtime-contract

  architecture:
    name: Architecture Visibility (P1)
    runs-on: ubuntu-latest
    needs: [non-rest-contracts]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Install backend deps
        run: uv sync --extra dev
      - name: Import Linter
        run: make architecture-check
        continue-on-error: true
