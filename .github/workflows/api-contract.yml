name: api-contract

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  openapi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install uv
        run: pip install uv
      - name: Sync Python dev deps
        run: uv sync --extra dev
      - name: Install npm deps
        run: npm ci
        working-directory: frontend
      - name: Install oasdiff
        # oasdiff is a Go binary, not on npm. Required for the
        # blocking diff against openapi/baseline/current.json.
        run: |
          go install github.com/oasdiff/oasdiff@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Run OpenAPI governance (export + lint + bundle)
        run: bash scripts/check_openapi.sh
      - name: Regenerate TS types
        run: npm run openapi:types
        working-directory: frontend
      - name: Run blocking diff against the baseline
        run: bash scripts/diff_openapi.sh
      - name: Run frontend boundary check
        run: npm run check:frontend-boundaries
        working-directory: frontend
      - name: i18n freshness guard
        run: npm run i18n:check
        working-directory: frontend
      - name: Code-size budget
        run: make size-budget
      - name: Freshness guard (regenerated artifacts match committed copies)
        run: make api-freshness
      - name: Backend governance + contract-shape tests
        run: uv run pytest tests/server/ -q
      - name: Frontend typecheck
        run: npm run typecheck
        working-directory: frontend